name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Build app
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to ACR
      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # Build Docker image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/demo-app:${{ github.sha }} .

      # Push image
      - name: Push Image
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/demo-app:${{ github.sha }}

      # Deploy to Container Apps
      - name: Deploy to Azure
        run: |
          set -e
      
          APP=${{ secrets.CONTAINER_APP_NAME }}
          RG=${{ secrets.RESOURCE_GROUP }}
          ACR=${{ secrets.ACR_NAME }}
          IMAGE="$ACR.azurecr.io/demo-app:${{ github.sha }}"
      
          # ensure container app environment exists (one-time safe)
          if ! az containerapp env show -n demo-env -g $RG > /dev/null 2>&1; then
            echo "Creating Container Apps environment..."
            az containerapp env create -n demo-env -g $RG -l eastus
          fi
      
          # check if app exists
          if az containerapp show -n $APP -g $RG > /dev/null 2>&1; then
            echo "Updating existing Container App..."
            az containerapp update \
              --name $APP \
              --resource-group $RG \
              --image $IMAGE
          else
            echo "Creating new Container App..."
            az containerapp create \
              --name $APP \
              --resource-group $RG \
              --environment demo-env \
              --image $IMAGE \
              --target-port 8080 \
              --ingress external \
              --registry-server $ACR.azurecr.io
          fi